<div class="admin-shell">
  <aside class="sidebar" [class.closed]="!sidebarOpen()">
    <div class="brand">
      <div class="brand-mark">M</div>
      <div>
        <strong>ماصايف</strong>
        <span>لوحة الإدارة</span>
      </div>
    </div>

    <nav class="menu">
      <a routerLink="/admin/dashboard" routerLinkActive="active">الرئيسية</a>
      <a routerLink="/admin/experiences" routerLinkActive="active">التجارب</a>
      <a routerLink="/admin/places" routerLinkActive="active">الأماكن</a>
      <a routerLink="/admin/cities" routerLinkActive="active">المدن</a>
      <a routerLink="/admin/price-profiles" routerLinkActive="active">ملفات الأسعار</a>
      <a routerLink="/admin/roles" routerLinkActive="active">الأدوار</a>
      <a routerLink="/admin/permissions" routerLinkActive="active">الصلاحيات</a>
      <a routerLink="/admin/lookups" routerLinkActive="active">القوائم</a>
      <a routerLink="/admin/users" routerLinkActive="active">المستخدمون</a>
      <a routerLink="/admin/settings" routerLinkActive="active">الإعدادات</a>
    </nav>

    <div class="sidebar-footer">
      @if (auth.session(); as session) {
        <div class="session-card">
          <strong>{{ session.fullName }}</strong>
          <small>{{ session.userName }}</small>
        </div>
      }
      <button type="button" (click)="logout()">خروج</button>
    </div>
  </aside>

  <main class="admin-main">
    <header class="topbar">
      <button type="button" class="toggle" (click)="sidebarOpen.set(!sidebarOpen())">☰</button>
      <div class="topbar-title">
        <h1>لوحة التحكم</h1>
        <p>إدارة الموقع ومراجعة التجارب وتنظيم المحتوى.</p>
      </div>
      <a class="preview-link" routerLink="/">فتح الموقع</a>
    </header>

    <section class="content">
      <router-outlet />
    </section>
  </main>
</div>
