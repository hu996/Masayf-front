<section class="admin-login">
  <div class="card">
    <h1>دخول الإدارة</h1>
    <p class="subtext">استخدم البريد الإلكتروني أو اسم المستخدم للدخول.</p>

    <form [formGroup]="form" (ngSubmit)="login()" class="form">
      <div class="field">
        <label>البريد الإلكتروني أو اسم المستخدم</label>
        <input
          type="text"
          formControlName="userName"
          placeholder="name@example.com"
          autocomplete="email"
          autocapitalize="off"
          spellcheck="false"
        />
      </div>
      <div class="field">
        <label>كلمة المرور</label>
        <input type="password" formControlName="password" placeholder="••••••••" autocomplete="current-password" />
      </div>

      @if (auth.errorMessage()) {
        <p class="error">{{ auth.errorMessage() }}</p>
      }

      <button type="submit" class="btn" [disabled]="auth.loading()">
        {{ auth.loading() ? 'جاري الدخول...' : 'دخول' }}
      </button>
    </form>
  </div>
</section>
