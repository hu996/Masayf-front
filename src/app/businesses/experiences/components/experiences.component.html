<section class="experiences-hero">
  <div class="container">
    <p class="eyebrow">تجارب الناس</p>
    <h1>اسمع من ناس سافروا قبلك</h1>
    <p>تكلفة حقيقية، نصائح عملية، وتقييمات تساعدك تختار الرحلة المناسبة.</p>
  </div>
</section>

<section class="page">
  <div class="container">
    <form class="filters" [formGroup]="filters" (ngSubmit)="search()">
      <div class="field"><label>المدينة</label><select formControlName="cityId"><option value="">كل المدن</option>@for (city of cities(); track city.id || city.cityId) {<option [value]="city.id || city.cityId">{{ city.name }}</option>}</select></div>
      <div class="field"><label>الميزانية</label><input type="number" formControlName="budget"></div>
      <div class="field"><label>الأيام</label><input type="number" formControlName="days"></div>
      <div class="field"><label>الأشخاص</label><input type="number" formControlName="peopleCount"></div>
      <div class="field"><label>التقييم</label><input type="number" min="1" max="5" formControlName="rating"></div>
      <div class="field"><label>نوع الرحلة</label><select formControlName="tripType"><option value="">كل الأنواع</option><option value="1">عائلية</option><option value="2">أصدقاء</option><option value="3">مغامرة</option><option value="4">رومانسية</option><option value="5">شبابية</option><option value="6">استرخاء</option><option value="7">اقتصادية</option><option value="8">فاخرة</option></select></div>
      <button class="btn btn-primary" type="submit">بحث</button>
    </form>

    @if (loading()) {
      <app-skeleton-grid [count]="6" />
    } @else if (experiences().length) {
      <div class="experience-grid">
        @for (experience of experiences(); track experience.id || experience.title) {
          <app-experience-card [experience]="experience" />
        }
      </div>
    } @else {
      <app-empty-state title="لا توجد تجارب منشورة" description="لا توجد نتائج مطابقة أو أن بيانات تجارب الناس غير متاحة حالياً." />
    }
  </div>
</section>
